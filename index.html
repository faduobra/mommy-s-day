<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法朵 FADOU | 2026 母親節企劃</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fadu-rose: #d68c92;
            --fadu-warm: #fffafb;
            --fadu-gold: #b38b4d;
            --white: #ffffff;
            --text-main: #4a4242;
            --line-green: #06C755;
        }

        body { font-family: 'Jost', 'Noto Sans TC', sans-serif; background-color: var(--fadu-warm); margin: 0; padding: 0; color: var(--text-main); letter-spacing: 0.05em; }

        /* [前段樣式與彈窗代碼維持不變，僅針對按鈕區進行重設計] */
        .header-section { padding: 60px 20px 80px; text-align: center; background: linear-gradient(180deg, #fdf1f2 0%, var(--fadu-warm) 100%); }
        .hero-promo-container { width: 90%; margin: -50px auto 40px; position: relative; z-index: 10; }
        .hero-promo-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 20px 45px rgba(214, 140, 146, 0.15); border: 1px solid #fff; }
        .nav-section { width: 92%; margin: 0 auto 40px; }
        .nav-card { background: var(--white); border-radius: 20px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); cursor: pointer; }
        .nav-img-main { width: 100%; height: 200px; object-fit: cover; display: block; }
        .nav-info-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-info-bar h2 { margin: 0; font-size: 20px; font-weight: 900; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); }
        .modal-content { background: var(--fadu-warm); margin: 5% auto; padding: 0; width: 92%; max-height: 85vh; border-radius: 30px; overflow-y: auto; position: relative; animation: slideUp 0.4s ease; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; z-index: 10; cursor: pointer; }
        .modal-header-img { width: 100%; height: 180px; object-fit: cover; }
        .modal-body { padding: 25px 15px; }
        .visual-item { background: #fff; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #fdf2f3; }
        .visual-item img { width: 100%; height: 320px; object-fit: cover; display: block; }
        .visual-info { padding: 20px; position: relative; }
        .price-tag { position: absolute; top: -30px; right: 15px; background: var(--fadu-rose); color: #fff; padding: 8px 18px; border-radius: 50px; font-weight: 900; font-size: 18px; }
        .gift-showcase { width: 90%; margin: 40px auto; background: #fff; border-radius: 20px; padding: 25px; border: 1px solid #fdf2f3; }

        /* 🔥 超亮眼導購按鈕區 */
        .btn-group { width: 92%; margin: 60px auto 80px; }
        
        .cta-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 28px; border-radius: 22px; text-decoration: none;
            margin-bottom: 22px; transition: all 0.3s ease;
            position: relative; overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        /* LINE 按鈕優化 */
        .btn-line {
            background: linear-gradient(135deg, #06C755 0%, #05B34C 100%);
            color: white; border: 2px solid rgba(255,255,255,0.1);
        }
        .btn-line:after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.15); transform: rotate(30deg);
            animation: shine 4s infinite;
        }

        /* APP 按鈕優化 */
        .btn-app {
            background: linear-gradient(135deg, #2D2929 0%, #1A1818 100%);
            color: white; border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-text-wrap { display: flex; flex-direction: column; text-align: left; }
        .btn-label { font-size: 11px; font-weight: 500; opacity: 0.9; letter-spacing: 0.15em; margin-bottom: 4px; text-transform: uppercase; }
        .btn-main-text { font-size: 19px; font-weight: 900; letter-spacing: 0.02em; }
        
        .btn-icon-circle {
            width: 44px; height: 44px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-family: sans-serif;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .cta-btn:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .footer { text-align: center; font-size: 11px; color: #ccc; padding-bottom: 40px; }
    </style>
</head>
<body>

    <header class="header-section">
        <span>FADOU ‧ 2026 MOTHER'S DAY</span>
        <h1>致溫柔的妳<br>法朵門市母親節慶典</h1>
    </header>

    <div class="hero-promo-container">
        <section class="hero-promo-card">
            <span style="font-size: 24px; font-weight: 900; color: var(--fadu-rose);">全館正品 任挑三件 85 折</span><br>
            <span style="font-size: 15px; color: var(--fadu-gold); font-weight: 700;">✨ 滿 $4,500 即贈精品旅行收納袋 ✨</span>
        </section>
    </div>

    <div class="nav-section">
        <div class="nav-card" onclick="openModal('newModal')">
            <img src="1.jpg" class="nav-img-main">
            <div class="nav-info-bar"><h2>春季新品上市</h2><span style="color: var(--fadu-rose);">查看清單 ›</span></div>
        </div>
        <div class="nav-card" onclick="openModal('saleModal')">
            <img src="2.jpg" class="nav-img-main">
            <div class="nav-info-bar"><h2>門市精選折扣</h2><span style="color: var(--fadu-gold);">熱銷活動 ›</span></div>
        </div>
    </div>

    <section class="gift-showcase">
        <h3 style="text-align: center; color: var(--fadu-gold); margin-top: 0;">限量滿額禮</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <img src="IMG_4947.JPG" style="flex: 1; width: 50%; border-radius: 10px;">
            <img src="IMG_4948.JPG" style="flex: 1; width: 50%; border-radius: 10px;">
        </div>
        <p style="font-size: 14px; color: #666; line-height: 1.6;"><strong>內衣旅行收納袋</strong>：專屬分層確保不變形，霧面絲綢質感，為旅行增添優雅。</p>
    </section>

    <div class="btn-group">
        <a href="https://lin.ee/U2TINN9" class="cta-btn btn-line">
            <div class="btn-text-wrap">
                <span class="btn-label">EXCLUSIVE GIFT</span>
                <span class="btn-main-text">領取免費內褲兌換券</span>
            </div>
            <div class="btn-icon-circle">🎁</div>
        </a>

        <a href="https://bmai.app/cf09c1ac" class="cta-btn btn-app">
            <div class="btn-text-wrap">
                <span class="btn-label">APP SPECIAL</span>
                <span class="btn-main-text">首購立即現折 $100</span>
            </div>
            <div class="btn-icon-circle">✨</div>
        </a>
    </div>

    <footer class="footer">FADOU LINGERIE TAIWAN</footer>

    <script>
        function openModal(id) { document.getElementById(id).style.display = "block"; document.body.style.overflow = "hidden"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; document.body.style.overflow = "auto"; }
        window.onclick = function(event) { if (event.target.className === 'modal') { event.target.style.display = "none"; document.body.style.overflow = "auto"; } }
    </script>
</body>
</html>
