<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法朵 FADOU | 母親節寵愛攻略</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fadu-main: #d68c92; /* 法朵核心粉 */
            --fadu-bg: #fff5f6;
            --fadu-gold: #b38b4d; /* 質感金 */
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--fadu-bg);
            color: #333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 頂部強勢標語區 */
        .hero-banner {
            background: linear-gradient(135deg, #f8d7da 0%, #e4a1a7 100%);
            padding: 50px 20px;
            text-align: center;
            color: var(--white);
            clip-path: ellipse(120% 100% at 50% 0%);
        }

        .hero-banner h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 1px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .hero-banner p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        /* 超顯眼活動區塊 */
        .promo-container {
            width: 92%;
            margin: -35px auto 20px;
            z-index: 10;
            position: relative;
        }

        .promo-card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(214, 140, 146, 0.3);
            border: 2px solid var(--fadu-main);
        }

        .main-offer {
            font-size: 30px;
            font-weight: 900;
            color: var(--fadu-main);
            margin-bottom: 10px;
            display: block;
        }

        .gift-offer {
            display: inline-block;
            background: #fff0f0;
            color: var(--fadu-gold);
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            border: 1px dashed var(--gold);
        }

        /* 攻略區塊 */
        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            margin: 30px 0 15px;
            color: var(--fadu-main);
        }

        .strategy-box {
            width: 92%;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .card img { width: 100%; height: auto; display: block; object-fit: cover; }
        .card-content { padding: 15px; }
        .tag { font-size: 12px; font-weight: 700; color: var(--fadu-main); border: 1px solid var(--fadu-main); padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
        .card-h3 { margin: 5px 0; font-size: 18px; font-weight: 700; }
        .card-p { margin: 5px 0; font-size: 14px; color: #666; }

        /* 底部固定按鈕區 */
        .action-area {
            width: 92%;
            margin: 20px auto 40px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 55px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-line { background-color: #06C755; color: white; }
        .btn-app { background-color: #333; color: white; }

        .footer { text-align: center; font-size: 12px; color: #aaa; padding-bottom: 40px; }
    </style>
</head>
<body>

    <div class="hero-banner">
        <h1>🌷 法朵母親節 ‧ 寵愛媽咪</h1>
        <p>優雅舒適，從這一件開始</p>
    </div>

    <div class="promo-container">
        <div class="promo-card">
            <span class="main-offer">全館正品 任選 3 件 85 折</span>
            <div class="gift-offer">✨ 滿 $4,500 贈內衣旅行收納袋 ✨</div>
        </div>
    </div>

    <div class="section-title">更衣間專屬攻略</div>

    <div class="strategy-box">
        <div class="card">
            <img src="https://via.placeholder.com/600x350?text=3+Items+Mix+%26+Match" alt="任選三件85折">
            <div class="card-content">
                <span class="tag">自由配最划算</span>
                <div class="card-h3">不限款式 ‧ 任選 3 件 85 折</div>
                <div class="card-p">正品內衣褲隨心搭配，試穿喜歡的直接帶走！</div>
            </div>
        </div>

        <div class="card">
            <img src="IMG_4947.JPG" alt="滿額贈品:內衣旅行收納袋">
            <div class="card-content">
                <span class="tag">滿額限定好禮</span>
                <div class="card-h3">滿 $4,500 送旅行收納袋</div>
                <div class="card-p">精緻收納包限量贈送！<br>推薦：<strong>3 套成套內衣褲 + 加購區</strong> 輕鬆達標！</div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <a href="#" class="btn btn-line">加入 LINE 領內褲兌換券</a>
        <a href="#" class="btn btn-app">新會員滿 1000 折 100 (點我下載)</a>
    </div>

    <div class="footer">
        法朵 FADOU ‧ 台灣內衣品牌<br>
        © 2026 FADOU Lingerie
    </div>

</body>
</html>
